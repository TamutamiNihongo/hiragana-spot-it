<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>いろのせかい — Japanese Colors</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Hiragino Kaku Gothic Pro', 'Noto Sans JP', sans-serif;
    background: #f5f0e8;
    color: #1a1a1a;
    min-height: 100vh;
  }

  header {
    background: #1a1a1a;
    color: #f5f0e8;
    padding: 24px 32px;
    display: flex;
    align-items: baseline;
    gap: 16px;
  }
  header h1 { font-size: 2rem; font-weight: 900; letter-spacing: -0.02em; }
  header span { font-size: 1rem; opacity: 0.55; }

  nav {
    display: flex;
    border-bottom: 2px solid #1a1a1a;
    background: #f5f0e8;
  }
  nav button {
    padding: 14px 28px;
    font-size: 0.95rem;
    font-weight: 700;
    border: none;
    background: transparent;
    cursor: pointer;
    border-bottom: 3px solid transparent;
    margin-bottom: -2px;
    transition: border-color 0.15s;
  }
  nav button.active { border-bottom-color: #1a1a1a; }
  nav button:hover:not(.active) { background: #e8e3db; }

  .page { display: none; padding: 40px 32px; max-width: 960px; margin: 0 auto; }
  .page.active { display: block; }

  /* ── COLOR GRID ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 16px;
    margin-top: 8px;
  }

  .color-card {
    border: 2px solid #1a1a1a;
    overflow: hidden;
    cursor: default;
  }
  .color-swatch {
    height: 110px;
    width: 100%;
  }
  .color-info {
    background: #fff;
    padding: 10px 12px;
    border-top: 2px solid #1a1a1a;
  }
  .color-jp { font-size: 1.35rem; font-weight: 800; }
  .color-script { font-size: 0.78rem; color: #555; margin-top: 2px; }
  .color-th { font-size: 0.82rem; color: #777; margin-top: 1px; }

  /* ── MIXING GAME ── */
  .mixer-layout {
    display: grid;
    grid-template-columns: 1fr auto 1fr auto 1fr;
    gap: 24px;
    align-items: center;
    margin-top: 8px;
  }

  @media (max-width: 640px) {
    .mixer-layout {
      grid-template-columns: 1fr;
      text-align: center;
    }
    .plus-sign, .equals-sign { font-size: 2rem; justify-self: center; }
  }

  .picker-box {
    border: 2px solid #1a1a1a;
    overflow: hidden;
  }
  .picker-swatch {
    height: 120px;
    width: 100%;
    transition: background 0.4s ease;
  }
  .picker-controls {
    background: #fff;
    border-top: 2px solid #1a1a1a;
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .picker-controls label { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; }
  .picker-controls select {
    width: 100%;
    padding: 6px 8px;
    font-size: 0.9rem;
    border: 2px solid #1a1a1a;
    background: #f5f0e8;
    cursor: pointer;
    appearance: none;
    font-family: inherit;
  }

  .plus-sign, .equals-sign {
    font-size: 2.5rem;
    font-weight: 900;
    color: #1a1a1a;
    justify-self: center;
  }

  .result-box {
    border: 2px solid #1a1a1a;
    overflow: hidden;
  }
  .result-swatch {
    height: 120px;
    transition: background 0.4s ease;
  }
  .result-info {
    background: #fff;
    border-top: 2px solid #1a1a1a;
    padding: 10px 12px;
    min-height: 80px;
  }
  .result-jp { font-size: 1.4rem; font-weight: 800; }
  .result-desc { font-size: 0.82rem; color: #555; margin-top: 4px; line-height: 1.4; }

  .mix-btn {
    display: block;
    margin: 28px auto 0;
    padding: 14px 40px;
    background: #1a1a1a;
    color: #f5f0e8;
    font-size: 1rem;
    font-weight: 800;
    border: none;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: background 0.15s;
  }
  .mix-btn:hover { background: #333; }

  .mix-history {
    margin-top: 40px;
    border-top: 2px solid #1a1a1a;
    padding-top: 24px;
  }
  .mix-history h2 { font-size: 1rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 14px; }
  .history-list { display: flex; flex-direction: column; gap: 8px; }
  .history-item {
    display: flex;
    align-items: center;
    gap: 10px;
    background: #fff;
    border: 1.5px solid #ccc;
    padding: 8px 12px;
    font-size: 0.88rem;
  }
  .h-dot {
    width: 20px; height: 20px;
    border: 1.5px solid #888;
    flex-shrink: 0;
  }
  .h-arrow { color: #888; }
  .h-result { font-weight: 700; }
</style>
</head>
<body>

<header>
  <h1>いろのせかい</h1>
  <span>Japanese Color Explorer</span>
</header>

<nav>
  <button class="active" onclick="showPage('colors', this)">🎨 สีต่างๆ</button>
  <button onclick="showPage('mixer', this)">🧪 ผสมสี</button>
</nav>

<!-- PAGE: COLORS -->
<div id="page-colors" class="page active">
  <div class="grid" id="color-grid"></div>
</div>

<!-- PAGE: MIXER -->
<div id="page-mixer" class="page">
  <div class="mixer-layout">
    <div class="picker-box">
      <div class="picker-swatch" id="swatch-a"></div>
      <div class="picker-controls">
        <label>สีที่ 1</label>
        <select id="select-a" onchange="updateSwatch('a')"></select>
        <div id="label-a" style="font-size:0.82rem;color:#555;margin-top:2px;"></div>
      </div>
    </div>
    <div class="plus-sign">＋</div>
    <div class="picker-box">
      <div class="picker-swatch" id="swatch-b"></div>
      <div class="picker-controls">
        <label>สีที่ 2</label>
        <select id="select-b" onchange="updateSwatch('b')"></select>
        <div id="label-b" style="font-size:0.82rem;color:#555;margin-top:2px;"></div>
      </div>
    </div>
    <div class="equals-sign">＝</div>
    <div class="result-box">
      <div class="result-swatch" id="result-swatch"></div>
      <div class="result-info">
        <div class="result-jp" id="result-jp">—</div>
        <div class="result-desc" id="result-desc">เลือกสีสองสีแล้วกด "ผสมสี"</div>
      </div>
    </div>
  </div>

  <button class="mix-btn" onclick="mixColors()">✦ ผสมสี!</button>

  <div class="mix-history">
    <h2>ประวัติการผสม</h2>
    <div class="history-list" id="history-list">
      <div style="color:#888;font-size:0.88rem;">ยังไม่มีการผสมสี</div>
    </div>
  </div>
</div>

<script>
const COLORS = [
  { jp: 'あか',    roman: 'Aka',      th: 'แดง',     hex: '#E84040' },
  { jp: 'きいろ',  roman: 'Kiiro',    th: 'เหลือง',  hex: '#F5D020' },
  { jp: 'ピンク',  roman: 'Pinku',    th: 'ชมพู',    hex: '#F48FB1' },
  { jp: 'みどり',  roman: 'Midori',   th: 'เขียว',   hex: '#3DAA5C' },
  { jp: 'むらさき',roman: 'Murasaki', th: 'ม่วง',    hex: '#8B5CF6' },
  { jp: 'オレンジ',roman: 'Orenji',   th: 'ส้ม',     hex: '#F97316' },
  { jp: 'あお',    roman: 'Ao',       th: 'น้ำเงิน', hex: '#2563EB' },
  { jp: 'しろ',    roman: 'Shiro',    th: 'ขาว',     hex: '#F8F8F8' },
  { jp: 'くろ',    roman: 'Kuro',     th: 'ดำ',      hex: '#1A1A1A' },
  { jp: 'しゃいろ',roman: 'Shairo',   th: 'น้ำตาล',  hex: '#92400E' },
  { jp: 'グレー',  roman: 'Gurē',     th: 'เทา',     hex: '#9CA3AF' },
  { jp: 'みずいろ',roman: 'Mizuiro',  th: 'ฟ้าอ่อน', hex: '#7DD3FC' },
];

// Mix rules: key = sorted indices joined by '-', value = { jp, th, hex }
const MIX_RULES = {};
function addRule(a, b, jp, th, hex) {
  const ia = COLORS.findIndex(c => c.jp === a);
  const ib = COLORS.findIndex(c => c.jp === b);
  const key = [ia, ib].sort((x,y)=>x-y).join('-');
  MIX_RULES[key] = { jp, th, hex };
}

// あか + きいろ = オレンジ
addRule('あか','きいろ','オレンジ','ส้ม','#F97316');
// あか + あお = むらさき
addRule('あか','あお','むらさき','ม่วง','#8B5CF6');
// あか + しろ = ピンク
addRule('あか','しろ','ピンク','ชมพู','#F48FB1');
// あか + くろ = えんじいろ (แดงเข้ม)
addRule('あか','くろ','えんじいろ','แดงเข้ม','#8B1010');
// あお + きいろ = みどり
addRule('あお','きいろ','みどり','เขียว','#3DAA5C');
// あお + しろ = みずいろ
addRule('あお','しろ','みずいろ','ฟ้าอ่อน','#7DD3FC');
// あお + くろ = こんいろ (กรมท่า)
addRule('あお','くろ','こんいろ','กรมท่า','#1E3A5F');
// きいろ + しろ = クリーム (ครีม)
addRule('きいろ','しろ','クリーム','ครีม','#FFF8D6');
// きいろ + くろ = オリーブ (โอลีฟ)
addRule('きいろ','くろ','オリーブ','สีมะกอก','#6B7000');
// みどり + しろ = ライトグリーン
addRule('みどり','しろ','ライトグリーン','เขียวอ่อน','#86EFAC');
// みどり + くろ = ダークグリーン
addRule('みどり','くろ','ダークグリーン','เขียวเข้ม','#14532D');
// むらさき + しろ = ラベンダー
addRule('むらさき','しろ','ラベンダー','ลาเวนเดอร์','#DDD6FE');
// むらさき + くろ = ふかむらさき
addRule('むらさき','くろ','ふかむらさき','ม่วงเข้ม','#3B0764');
// しゃいろ + しろ = ベージュ
addRule('しゃいろ','しろ','ベージュ','เบจ','#D9B896');
// グレー + しろ = ライトグレー
addRule('グレー','しろ','ライトグレー','เทาอ่อน','#D1D5DB');
// グレー + くろ = ダークグレー
addRule('グレー','くろ','ダークグレー','เทาเข้ม','#374151');
// ピンク + むらさき = ホットピンク
addRule('ピンク','むらさき','ホットピンク','ชมพูบานเย็น','#E040A0');
// オレンジ + しろ = もものいろ (พีช)
addRule('オレンジ','しろ','もものいろ','สีพีช','#FFCBA4');
// オレンジ + くろ = こげちゃ (น้ำตาลเข้ม)
addRule('オレンジ','くろ','こげちゃ','น้ำตาลเข้ม','#7C3A00');
// みずいろ + みどり = ターコイズ
addRule('みずいろ','みどり','ターコイズ','เทอร์ควอยส์','#2DD4BF');
// しろ + くろ = グレー
addRule('しろ','くろ','グレー','เทา','#9CA3AF');

function blendHex(h1, h2) {
  const parse = h => ({ r: parseInt(h.slice(1,3),16), g: parseInt(h.slice(3,5),16), b: parseInt(h.slice(5,7),16) });
  const a = parse(h1), b = parse(h2);
  const r = Math.round((a.r+b.r)/2).toString(16).padStart(2,'0');
  const g = Math.round((a.g+b.g)/2).toString(16).padStart(2,'0');
  const bv = Math.round((a.b+b.b)/2).toString(16).padStart(2,'0');
  return `#${r}${g}${bv}`;
}

// Build color grid
const grid = document.getElementById('color-grid');
COLORS.forEach(c => {
  grid.innerHTML += `
    <div class="color-card">
      <div class="color-swatch" style="background:${c.hex}"></div>
      <div class="color-info">
        <div class="color-jp">${c.jp}</div>
        <div class="color-script">${c.roman}</div>
        <div class="color-th">${c.th}</div>
      </div>
    </div>`;
});

// Build selects
['a','b'].forEach(id => {
  const sel = document.getElementById(`select-${id}`);
  COLORS.forEach((c, i) => {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = `${c.jp} (${c.th})`;
    sel.appendChild(opt);
  });
  if (id === 'b') sel.selectedIndex = 1;
  updateSwatch(id);
});

function updateSwatch(id) {
  const sel = document.getElementById(`select-${id}`);
  const c = COLORS[sel.value];
  document.getElementById(`swatch-${id}`).style.background = c.hex;
  document.getElementById(`label-${id}`).textContent = `${c.roman} · ${c.th}`;
}

let history = [];

function mixColors() {
  const ia = parseInt(document.getElementById('select-a').value);
  const ib = parseInt(document.getElementById('select-b').value);
  const ca = COLORS[ia], cb = COLORS[ib];

  let result;
  if (ia === ib) {
    result = { jp: ca.jp, th: `${ca.th} (เดิม)`, hex: ca.hex };
  } else {
    const key = [ia, ib].sort((x,y)=>x-y).join('-');
    if (MIX_RULES[key]) {
      result = MIX_RULES[key];
    } else {
      const blended = blendHex(ca.hex, cb.hex);
      result = { jp: 'まぜいろ', th: 'สีผสม', hex: blended };
    }
  }

  document.getElementById('result-swatch').style.background = result.hex;
  document.getElementById('result-jp').textContent = result.jp;
  document.getElementById('result-desc').textContent = result.th;

  // add to history
  history.unshift({ a: ca, b: cb, result });
  if (history.length > 8) history.pop();
  renderHistory();
}

function renderHistory() {
  const el = document.getElementById('history-list');
  if (!history.length) { el.innerHTML = '<div style="color:#888;font-size:0.88rem;">ยังไม่มีการผสมสี</div>'; return; }
  el.innerHTML = history.map(h => `
    <div class="history-item">
      <div class="h-dot" style="background:${h.a.hex}"></div>
      <span>${h.a.jp}</span>
      <span class="h-arrow">＋</span>
      <div class="h-dot" style="background:${h.b.hex}"></div>
      <span>${h.b.jp}</span>
      <span class="h-arrow">＝</span>
      <div class="h-dot" style="background:${h.result.hex}"></div>
      <span class="h-result">${h.result.jp}</span>
      <span style="color:#777;font-size:0.8rem;">${h.result.th}</span>
    </div>`).join('');
}

function showPage(name, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById(`page-${name}`).classList.add('active');
  btn.classList.add('active');
}
</script>
</body>
</html>
